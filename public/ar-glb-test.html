<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>AR 3D Test</title>
<script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.6.0/dist/aframe-master.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
<style>
  body { margin:0; overflow:hidden; background:#000; }
  #info { position:fixed; top:20px; left:0; right:0; text-align:center; color:#fff;
    font-family:sans-serif; font-size:13px; font-weight:bold; z-index:999;
    text-shadow:0 1px 4px rgba(0,0,0,.8); pointer-events:none; }
</style>
</head>
<body>
<div id="info">Point camera at Waikiki marker — 3D glass should appear</div>

<a-scene embedded arjs="sourceType:webcam;debugUIEnabled:false;"
  renderer="precision:medium;alpha:true;antialias:true;"
  vr-mode-ui="enabled:false">

  <a-assets timeout="15000">
    <a-asset-item id="cola" src="/cola_glass.glb" crossorigin="anonymous"></a-asset-item>
  </a-assets>

  <a-marker type="pattern" url="/markers/waikikiAR.patt" smooth="true">
    <a-entity
      gltf-model="#cola"
      position="0 0.2 0"
      scale="0.5 0.5 0.5"
      rotation="0 0 0"
      animation="property:rotation;to:0 360 0;loop:true;dur:4000;easing:linear">
    </a-entity>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>
</body>
</html>
