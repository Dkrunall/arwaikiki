<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>AR 3D Test</title>
<script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.6.0/dist/aframe-master.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
<style>
  body{margin:0;overflow:hidden;background:#000}
  #st{position:fixed;top:0;left:0;right:0;z-index:999;background:rgba(0,0,0,.7);
    color:#fff;font:bold 12px/1.8 sans-serif;padding:8px 12px;pointer-events:none}
</style>
</head>
<body>
<div id="st">Camera: <span id="tc">…</span> | Marker: <span id="tm">…</span> | Model: <span id="tmd">…</span></div>
<script>
window.addEventListener('arjs-video-loaded',function(){ document.getElementById('tc').textContent='✓'; });
AFRAME.registerComponent('mw',{init:function(){
  this.el.addEventListener('markerFound',function(){ document.getElementById('tm').textContent='LOCKED ✓'; });
  this.el.addEventListener('markerLost', function(){ document.getElementById('tm').textContent='lost'; });
}});
AFRAME.registerComponent('ml',{init:function(){
  this.el.addEventListener('model-loaded',function(){ document.getElementById('tmd').textContent='loaded ✓'; });
  this.el.addEventListener('model-error', function(){ document.getElementById('tmd').textContent='ERROR ✗'; });
}});
</script>

<a-scene embedded arjs="sourceType:webcam;debugUIEnabled:false;"
  renderer="precision:medium;alpha:true;antialias:true;colorManagement:true;"
  vr-mode-ui="enabled:false">

  <a-light type="ambient" intensity="1.5"></a-light>
  <a-light type="directional" position="1 3 1" intensity="2"></a-light>

  <a-marker type="pattern" url="/markers/waikikiAR.patt" smooth="true" mw>

    <a-entity
      gltf-model="url(/cola_glass.glb)" ml
      position="0 0.5 0"
      scale="0.006 0.006 0.006"
      look-at="#cam"
      animation__float="property:position;from:0 0.4 0;to:0 0.6 0;loop:true;dur:2000;dir:alternate;easing:easeInOutSine">
    </a-entity>

  </a-marker>

  <a-entity camera id="cam"></a-entity>
</a-scene>
</body>
</html>
