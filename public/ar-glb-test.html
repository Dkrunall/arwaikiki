<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>AR 3D Test</title>
<script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.6.0/dist/aframe-master.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
<style>
  body{margin:0;overflow:hidden;background:#000}
  #st{position:fixed;top:0;left:0;right:0;z-index:999;background:rgba(0,0,0,.7);
    color:#fff;font:bold 12px/1.8 sans-serif;padding:8px 12px;pointer-events:none}
  #hint{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
    z-index:999;background:rgba(81,9,9,.85);color:#fcefd4;
    font:bold 11px/1 sans-serif;padding:10px 20px;border-radius:20px;
    border:1px solid rgba(194,154,83,.4);pointer-events:none;
    letter-spacing:.1em;text-transform:uppercase}
</style>
</head>
<body>
<div id="st">Camera: <span id="tc">…</span> | Marker: <span id="tm">…</span> | Model: <span id="tmd">…</span></div>
<div id="hint">Drag to rotate the 3D model</div>

<script>
window.addEventListener('arjs-video-loaded', function(){ document.getElementById('tc').textContent='✓'; });
AFRAME.registerComponent('mw',{init:function(){
  this.el.addEventListener('markerFound', function(){ document.getElementById('tm').textContent='LOCKED ✓'; });
  this.el.addEventListener('markerLost',  function(){ document.getElementById('tm').textContent='lost'; });
}});
AFRAME.registerComponent('ml',{init:function(){
  this.el.addEventListener('model-loaded', function(){ document.getElementById('tmd').textContent='loaded ✓'; });
  this.el.addEventListener('model-error',  function(){ document.getElementById('tmd').textContent='ERROR ✗'; });
}});

/* ── Touch-rotate: drag finger to spin model on X and Y axes ── */
AFRAME.registerComponent('touch-rotate', {
  init: function () {
    var el      = this.el;
    var startX  = 0, startY  = 0;
    var baseRotX = 0, baseRotY = 0;
    var curRotX  = 0, curRotY  = 0;
    var active  = false;

    document.addEventListener('touchstart', function (e) {
      startX   = e.touches[0].clientX;
      startY   = e.touches[0].clientY;
      baseRotX = curRotX;
      baseRotY = curRotY;
      active   = true;
    }, { passive: true });

    document.addEventListener('touchmove', function (e) {
      if (!active) return;
      var dx = e.touches[0].clientX - startX;
      var dy = e.touches[0].clientY - startY;
      curRotY = baseRotY + dx * 0.6;           // horizontal drag → Y spin
      curRotX = baseRotX + dy * 0.4;           // vertical drag   → X tilt
      curRotX = Math.max(-75, Math.min(75, curRotX)); // clamp tilt
      el.setAttribute('rotation', { x: curRotX, y: curRotY, z: 0 });
    }, { passive: true });

    document.addEventListener('touchend',   function () { active = false; });
    document.addEventListener('touchcancel',function () { active = false; });
  }
});
</script>

<a-scene embedded arjs="sourceType:webcam;debugUIEnabled:false;"
  renderer="precision:medium;alpha:true;antialias:true;colorManagement:true;"
  vr-mode-ui="enabled:false">

  <a-light type="ambient" intensity="1.5"></a-light>
  <a-light type="directional" position="1 3 2" intensity="2.5"></a-light>

  <a-marker type="pattern" url="/markers/waikikiAR.patt" smooth="true" mw>

    <!-- Wrapper floats up and down; inner entity accepts touch-rotate -->
    <a-entity
      position="0 0 0"
      animation__float="property:position;from:0 0.4 0;to:0 0.6 0;loop:true;dur:2000;dir:alternate;easing:easeInOutSine">

      <a-entity
        gltf-model="url(/cola_glass.glb)"
        ml
        touch-rotate
        scale="0.006 0.006 0.006">
      </a-entity>

    </a-entity>

  </a-marker>

  <a-entity camera id="cam"></a-entity>
</a-scene>
</body>
</html>
