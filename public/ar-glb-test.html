<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>AR 3D Test</title>
<script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.6.0/dist/aframe-master.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
<style>
  body { margin:0; overflow:hidden; background:#000; }
  #status {
    position:fixed; top:0; left:0; right:0; z-index:999;
    background:rgba(0,0,0,.75); color:#fff; font:bold 13px/1.6 sans-serif;
    padding:10px 14px; pointer-events:none;
  }
</style>
</head>
<body>
<div id="status">
  Camera: <span id="t-cam">waiting…</span><br>
  Marker: <span id="t-mark">not detected</span><br>
  Model:  <span id="t-model">waiting…</span>
</div>

<script>
window.addEventListener('camera-init',       function(){ document.getElementById('t-cam').textContent  = 'active ✓'; });
window.addEventListener('camera-error',      function(){ document.getElementById('t-cam').textContent  = 'BLOCKED ✗'; });
window.addEventListener('arjs-video-loaded', function(){ document.getElementById('t-cam').textContent  = 'streaming ✓'; });

AFRAME.registerComponent('marker-watch', {
  init: function() {
    this.el.addEventListener('markerFound', function(){
      document.getElementById('t-mark').textContent = 'DETECTED ✓';
    });
    this.el.addEventListener('markerLost', function(){
      document.getElementById('t-mark').textContent = 'lost…';
    });
  }
});

AFRAME.registerComponent('model-watch', {
  init: function() {
    this.el.addEventListener('model-loaded', function(){
      document.getElementById('t-model').textContent = 'loaded ✓';
    });
    this.el.addEventListener('model-error', function(e){
      document.getElementById('t-model').textContent = 'ERROR: ' + (e.detail && e.detail.src);
    });
  }
});
</script>

<a-scene embedded
  arjs="sourceType:webcam;debugUIEnabled:false;"
  renderer="precision:medium;alpha:true;antialias:true;"
  vr-mode-ui="enabled:false">

  <a-marker type="pattern" url="/markers/waikikiAR.patt"
    smooth="true" smoothCount="5" marker-watch>

    <!-- RED BOX — confirms marker detection, no model needed -->
    <a-box position="0 0.5 0" scale="0.3 0.3 0.3" color="red"></a-box>

    <!-- GLB loaded via direct URL (bypasses asset preloader) -->
    <a-entity
      id="glb-entity"
      gltf-model="url(/cola_glass.glb)"
      model-watch
      position="0 0 0"
      scale="0.3 0.3 0.3"
      animation="property:rotation;to:0 360 0;loop:true;dur:4000;easing:linear">
    </a-entity>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>
</body>
</html>
