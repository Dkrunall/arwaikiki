<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 632 632" width="632" height="632">
  <!-- White margin (required by AR.js for detection) -->
  <rect width="632" height="632" fill="white"/>

  <!-- BLACK outer border — AR.js locates the marker by this dark rectangle -->
  <rect x="60" y="60" width="512" height="512" fill="#000000"/>

  <!-- Inner white content area (same 372x372 proportions as before) -->
  <rect x="130" y="130" width="372" height="372" fill="white"/>

  <!-- Bowl: wide inverted triangle -->
  <polygon points="208,160 424,160 316,270" fill="#510909"/>

  <!-- Liquid highlight inside bowl -->
  <polygon points="208,160 424,160 370,210 262,210" fill="#7a1212"/>

  <!-- Stem -->
  <rect x="309" y="270" width="14" height="88" fill="#510909"/>

  <!-- Base foot -->
  <rect x="258" y="358" width="116" height="14" fill="#510909"/>

  <!-- Olive/cherry on rim (asymmetry marker) -->
  <circle cx="400" cy="156" r="14" fill="#510909"/>
  <rect x="398" y="136" width="4" height="20" fill="#510909"/>

  <!-- AR MENU text -->
  <text
    x="316" y="418"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="48"
    text-anchor="middle"
    fill="#510909"
    letter-spacing="3"
  >AR MENU</text>

  <!-- Decorative line under text -->
  <rect x="178" y="428" width="276" height="5" fill="#510909"/>

  <!-- Asymmetry dot bottom-right (orientation detection) -->
  <rect x="418" y="442" width="20" height="20" fill="#510909"/>
</svg>
